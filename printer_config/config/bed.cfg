# =========================================================
# Heated Bed — BTT Kraken V1.1
# =========================================================

[heater_bed]
heater_pin: PF5        # HB on Kraken
sensor_pin: PB0        # THB on Kraken
sensor_type: Generic 3950
control: watermark
min_temp: 0
max_temp: 145

[verify_heater heater_bed]
max_error: 160
check_gain_time: 90
