# =========================================================
# TESTBENCH CONFIG — MOT4, MOT5, MOT6, MOT7
# BTT Octopus Pro 1.1 H723 — Watterott TMC5160-HV on all four
# sense_resistor: 0.075 (Watterott HV default)
# Standalone file — replace your printer.cfg with this
# =========================================================

[mcu]
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_4B001B001151313531383332-if00

[printer]
kinematics: none
max_velocity: 300
max_accel: 3000

# ---------------------------------------------------------
# MOT4 — DRIVER4
# MANUAL_STEPPER STEPPER=mot4 MOVE=10 SPEED=50
# ---------------------------------------------------------
[manual_stepper mot4]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 40
velocity: 50
accel: 100

[tmc5160 manual_stepper mot4]
cs_pin: PF2
spi_bus: spi1a
sense_resistor: 0.075
run_current: 1.6
stealthchop_threshold: 0
interpolate: true

# ---------------------------------------------------------
# MOT5 — DRIVER5
# MANUAL_STEPPER STEPPER=mot5 MOVE=10 SPEED=50
# ---------------------------------------------------------
[manual_stepper mot5]
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 40
velocity: 50
accel: 100

[tmc5160 manual_stepper mot5]
cs_pin: PE4
spi_bus: spi1a
sense_resistor: 0.075
run_current: 1.6
stealthchop_threshold: 0
interpolate: true

# ---------------------------------------------------------
# MOT6 — DRIVER6
# MANUAL_STEPPER STEPPER=mot6 MOVE=10 SPEED=50
# ---------------------------------------------------------
[manual_stepper mot6]
step_pin: PE2
dir_pin: PE3
enable_pin: !PD4
microsteps: 16
rotation_distance: 40
velocity: 50
accel: 100

[tmc5160 manual_stepper mot6]
cs_pin: PE1
spi_bus: spi1a
sense_resistor: 0.075
run_current: 1.6
stealthchop_threshold: 0
interpolate: true

# ---------------------------------------------------------
# MOT7 — DRIVER7
# MANUAL_STEPPER STEPPER=mot7 MOVE=10 SPEED=50
# ---------------------------------------------------------
[manual_stepper mot7]
step_pin: PE6
dir_pin: !PA14
enable_pin: !PE0
microsteps: 16
rotation_distance: 40
velocity: 50
accel: 100

[tmc5160 manual_stepper mot7]
cs_pin: PD3
spi_bus: spi1a
sense_resistor: 0.075
run_current: 1.6
stealthchop_threshold: 0
interpolate: true
