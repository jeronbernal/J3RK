# =========================================================
# Preheat Profiles
# Edit this file to add/tune per-material preheat temps.
# Used by the PREHEAT macro in macros/utility_macros.cfg
#
# Call from console: PREHEAT MATERIAL=ABS
#
# Fields:
#   bed      — bed target in °C
#   chamber  — chamber target in °C (0 = no chamber heating)
#   aux_fan  — aux fan speed during soak 0.0-1.0 (0 = off)
#              Open air filaments (PLA/PETG/PET/TPU): 0
#              Enclosed/recirculation filaments: 0.6
# =========================================================

[gcode_macro _PREHEAT_PROFILES]
variable_profiles: {
        'PLA':    {'bed':  60, 'chamber':   0, 'aux_fan': 0.0},
        'PETG':   {'bed':  70, 'chamber':   0, 'aux_fan': 0.0},
        'PET':    {'bed':  80, 'chamber':   0, 'aux_fan': 0.0},
        'PET-CF': {'bed':  80, 'chamber':   0, 'aux_fan': 0.0},
        'PET-GF': {'bed':  80, 'chamber':   0, 'aux_fan': 0.0},
        'TPU':    {'bed':  40, 'chamber':   0, 'aux_fan': 0.0},
        'PA':     {'bed': 110, 'chamber':   0, 'aux_fan': 0.0},
        'ABS':    {'bed':  90, 'chamber':  70, 'aux_fan': 0.6},
        'ABS-GF': {'bed':  90, 'chamber':  70, 'aux_fan': 0.6},
        'ASA':    {'bed':  90, 'chamber':  70, 'aux_fan': 0.6},
        'PC':     {'bed': 130, 'chamber':  85, 'aux_fan': 0.6},
        'PC-GF':  {'bed': 130, 'chamber':  85, 'aux_fan': 0.6},
        'PC-CF':  {'bed': 130, 'chamber':  85, 'aux_fan': 0.6}
    }
gcode:
