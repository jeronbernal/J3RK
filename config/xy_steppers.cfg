# =========================================================
# XY Steppers — Annex K3 / BTT Kraken V1.1
# Breakout board on S1-S4 (onboard TMC2160, Rsense=0.05 for V1.1)
# =========================================================
#
# Y1 = Front Right = Breakout Motor0 = Kraken S1
# X1 = Rear Right  = Breakout Motor1 = Kraken S2
# X  = Front Left  = Breakout Motor2 = Kraken S3
# Y  = Rear Left   = Breakout Motor3 = Kraken S4
# =========================================================

# ---------------------------------------------------------
# Y1 — Front Right — S1 on Kraken
# ---------------------------------------------------------
[stepper_y1]
step_pin: PC14         # S1 step
dir_pin: PC13         # S1 dir (confirm polarity with STEPPER_BUZZ)
enable_pin: !PE6       # S1 enable
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40

[tmc5160 stepper_y1]
cs_pin: PD6            # S1 CS
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
sense_resistor: 0.05   # Kraken V1.1 S1-S4
interpolate: True
run_current: 1.6
stealthchop_threshold: 0

# ---------------------------------------------------------
# X1 — Rear Right — S2 on Kraken
# ---------------------------------------------------------
[stepper_x1]
step_pin: PE5          # S2 step
dir_pin: !PE4           # S2 dir (confirm polarity)
enable_pin: !PE3       # S2 enable
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40

[tmc5160 stepper_x1]
cs_pin: PD5            # S2 CS
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
sense_resistor: 0.05
interpolate: True
run_current: 1.6
stealthchop_threshold: 0

# ---------------------------------------------------------
# X — Front Left — S3 on Kraken
# ---------------------------------------------------------
[stepper_x]
step_pin: PE2          # S3 step
dir_pin: PE1           # S3 dir (confirm polarity)
enable_pin: !PE0       # S3 enable
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40
endstop_pin: ^PC15    # MIN1 on Kraken (inverted)
position_min: -7
position_endstop: 180
position_max: 180
homing_speed: 100
homing_retract_dist: 10
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PD4            # S3 CS
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
sense_resistor: 0.05
interpolate: True
run_current: 1.6
stealthchop_threshold: 0

# ---------------------------------------------------------
# Y — Rear Left — S4 on Kraken
# ---------------------------------------------------------
[stepper_y]
step_pin: PB9          # S4 step
dir_pin: !PB8          # S4 dir (confirm polarity)
enable_pin: !PB7       # S4 enable
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40
endstop_pin: ^PF0     # MIN2 on Kraken (inverted)
position_min: 0
position_endstop: 185
position_max: 185
homing_speed: 100
homing_retract_dist: 10
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PD3            # S4 CS
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
sense_resistor: 0.05
interpolate: True
run_current: 1.6
stealthchop_threshold: 0
