# =========================================================
# Material Z Offset Table
# Edit this file to add/tune per-material Z offsets.
# Referenced by PRINT_START in macros/print_start.cfg
#
# Positive value = nozzle moves UP (further from bed)
# Negative value = nozzle moves DOWN (closer to bed)
# =========================================================

[gcode_macro _MATERIAL_Z_OFFSETS]
variable_offsets: {
        'PPS-CF':         0.07,
        'ezPC-CF':        0.00,
        'PC-CF':         -0.02,
        'PC-CF Smooth':   0.00,
        'PC-CF Textured': -0.04,
        'PC-CF Yxpolyer':  0.04,
        'PC':             0.00,
        'PET-CF':         0.06,
        'PET':            0.06,
        'PET-GF':         0.06
    }
gcode:
