# =========================================================
# Lights & LEDs
# =========================================================

[output_pin chamber_light]
pin: PA3
pwm: True
hardware_pwm: False
cycle_time: 0.010
value: 0
shutdown_value: 0

[output_pin electronics_bay_light]
pin: PB11
pwm: True
hardware_pwm: False
cycle_time: 0.010
value: 0
shutdown_value: 0

[neopixel matchstick]
pin: PB10
chain_count: 10
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0

# =========================================================
# LED Effects — Matchstick strip
# =========================================================

[led_effect ms_standby]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    static 0 0 top (1.0, 0.9, 0.8)

[led_effect ms_homing]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    static 0 0 top (1.0, 0.4, 0.0)

[led_effect ms_z_contact]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    static 0 0 top (0.8, 0.0, 1.0)

[led_effect ms_bed_preheat]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
heater: heater_bed
layers:
    heatergauge -1 0 top (1.0, 0.0, 0.0),(1.0, 0.8, 0.0)

[led_effect ms_print_progress]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    progress -1 0 top (0.6, 0.0, 1.0),(0.3, 0.0, 0.6)

[led_effect ms_clean_nozzle]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    static 0 0 top (0.0, 0.6, 1.0)

[led_effect ms_done]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    static 0 0 top (0.0, 0.3, 0.0)
    breathing 3 0 add (0.0, 0.7, 0.2)

[led_effect ms_paused]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    breathing 3 0 top (1.0, 0.8, 0.0)

[led_effect ms_error]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
run_on_error: true
layers:
    strobe 2 1.5 add (1.0, 0.0, 0.0)
    breathing 3 0 difference (0.6, 0.0, 0.0)
    static 0 0 top (0.2, 0.0, 0.0)

[led_effect ms_z_tilt]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    static 0 0 top (0.0, 0.9, 1.0)

[led_effect ms_bed_mesh]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    static 0 0 top (0.0, 1.0, 0.3)

[led_effect ms_hotend_preheat]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
heater: extruder
layers:
    heatergauge -1 0 top (0.8, 0.0, 0.0),(1.0, 0.5, 0.0)

[led_effect ms_white]
autostart: false
frame_rate: 24
leds:
    neopixel:matchstick (1-10)
layers:
    static 0 0 top (1.0, 1.0, 1.0)
