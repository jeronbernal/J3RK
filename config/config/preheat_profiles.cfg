# =========================================================
# Preheat Profiles
# Edit this file to add/tune per-material preheat temps.
# Used by the PREHEAT macro in macros/utility_macros.cfg
#
# Call from console: PREHEAT MATERIAL=ABS
#
# Fields:
#   bed     — bed target in °C
#   chamber — chamber target in °C (0 = no chamber heating)
# =========================================================

[gcode_macro _PREHEAT_PROFILES]
variable_profiles: {
        'PLA':    {'bed':  60, 'chamber':   0},
        'PETG':   {'bed':  70, 'chamber':   0},
        'PA':     {'bed': 110, 'chamber':   0},
        'ABS':    {'bed':  90, 'chamber':  70},
        'ABS-GF': {'bed':  90, 'chamber':  70},
        'ASA':    {'bed':  90, 'chamber':  70},
        'PC':     {'bed': 130, 'chamber':  85},
        'PC-GF':  {'bed': 130, 'chamber':  85},
        'PC-CF':  {'bed': 130, 'chamber':  85},
        'PET-GF': {'bed':  80, 'chamber':   0},
        'PET-CF': {'bed':  80, 'chamber':   0}
    }
gcode:
