# =========================================================
# Temperature Sensors — BTT Octopus Pro V1.1 H723
# =========================================================
#
# TH0  PF4 → PTC chamber fin thermistor
# TH1  PF5 → Top chamber thermistor
# TH2  PF6 → Bottom chamber thermistor 3
# THB  PF3 → Bed thermistor (in bed.cfg)
# =========================================================

[temperature_sensor MCU_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Raspberry_Pi_Temp]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

# Top chamber thermistor — TH1
[temperature_sensor chamber_top]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF5
min_temp: -20
max_temp: 120

# Bottom chamber thermistor 3 — TH2
[temperature_sensor chamber_bottom]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: PF6
min_temp: -20
max_temp: 120

# PTC chamber heater fin thermistor — TH0
[temperature_sensor chamber_heater_fin]
sensor_type: ATC Semitec 104GT-2
pullup_resistor: 4700
sensor_pin: PF4
min_temp: 0
max_temp: 160
gcode_id: chamber_fin

[thermistor Stepper_NTC10K]
temperature1: 25
resistance1: 10000
beta: 3950

# Motor thermistor — Dinghy PA2
[temperature_sensor Stepper_Motor_Temp]
sensor_type: Stepper_NTC10K
sensor_pin: Dinghy:PA2
min_temp: 0
max_temp: 250

# TK heatsink thermistor — Dinghy PA0
[temperature_sensor TK_Heatsink]
sensor_type: NTC 100K MGB18-104F39050L32
sensor_pin: Dinghy:PA0
min_temp: 0
max_temp: 200

# Toolhead chamber thermistor — Dinghy PA1
[temperature_sensor toolhead_chamber]
sensor_type: ATC Semitec 104NT-4-R025H42G
sensor_pin: Dinghy:PA1
min_temp: -20
max_temp: 150
