# =========================================================
# Beacon RevH — Eddy-current probe + contact Z calibration
# =========================================================

[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_1E4E65C25157355957202020FF112A16-if00
x_offset: -25.2
y_offset: 0
mesh_main_direction: x
mesh_runs: 2
speed: 100
lift_speed: 75
z_settling_time: 200
contact_max_hotend_temperature: 315
home_xy_position: 90, 90
home_z_hop: 10
home_z_hop_speed: 30
home_xy_move_speed: 400
home_method: proximity
home_method_when_homed: proximity
home_autocalibrate: never
is_non_critical: True

# =========================================================
# Resonance tester — uses Beacon accelerometer
# =========================================================

[resonance_tester]
accel_chip: beacon
probe_points: 90, 90, 20
accel_per_hz: 150
sweeping_accel: 400
sweeping_period: 0

