# This file contains pin mappings for the Dragonkitty Dragon Dinghy IO board.
# Firmware should be compiled for the STM32F072xb.
# This board replaces the BTT MMB Cubic.

# See docs/Config_Reference.md for a description of parameters.

[mcu Dinghy]
serial: /dev/serial/by-id/usb-Klipper_stm32f072xb_1B0025000A57465238313620-if00


[temperature_sensor Dragon_Dinghy]
sensor_type: temperature_mcu
sensor_mcu: Dinghy

# =========================================================
# Temperature sensors on Dinghy (replaces Cubic GPIO pins)
# Cubic GPIO26 → Dinghy PA2  (Stepper_Motor_Temp)
# Cubic GPIO27 → Dinghy PA1  (toolhead_chamber)
# Cubic GPIO28 → Dinghy PA0  (TK_Heatsink)
# Dinghy PA3                 (top_chamber_therm2, 4700 pullup)
# Dinghy PB0                 (top_chamber_therm3, 4700 pullup)
# Dinghy PA6                 (bottom_chamber_therm2, 2200 pullup)
# Dinghy PB4                 (camera_fan)
# Dinghy PB10                (matchstick neopixel RGB)
# =========================================================
