# =========================================================
# Heated Bed — BTT Octopus Pro V1.1 H723
# =========================================================

[heater_bed]
heater_pin: PA1              # HB on Octopus Pro v1.1
sensor_pin: PF3              # THB on Octopus Pro v1.1
sensor_type: Generic 3950
control: watermark
min_temp: 0
max_temp: 145

[verify_heater heater_bed]
max_error: 160
check_gain_time: 90
