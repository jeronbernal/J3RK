# =========================================================
# Bed Type Z Offset Table
# Edit this file to tune per-bed-surface Z offsets.
# Referenced by PRINT_START in macros/print_start.cfg
#
# These stack ON TOP of the material offset in material_offsets.cfg
# and the base 0.03 offset. So total Z = 0.03 + material + bed_type.
#
# Positive value = nozzle moves UP (further from bed)
# Negative value = nozzle moves DOWN (closer to bed)
#
# OrcaSlicer plate names (use these exactly as keys):
#   High Temp Plate
#   Textured PEI Plate
#   Smooth PEI Plate
#   Cool Plate
# =========================================================

[gcode_macro _BED_TYPE_Z_OFFSETS]
variable_offsets: {
        'High Temp Plate':    0.00,
        'Textured PEI Plate': 0.00,
        'Smooth PEI Plate':   0.20,
        'Cool Plate':         0.00
    }
gcode:
