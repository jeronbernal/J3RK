[gcode_macro PRINT_END]
description: Annex K3 print end with safe Z lift and fixed park at X175 Y175
gcode:
    {% set z_max = printer.toolhead.axis_maximum.z|float %}
    {% set z_now = printer.toolhead.position.z|float %}
    {% set z_lift = 10.0 %}
    {% set z_safe = z_now + z_lift if (z_now + z_lift) < z_max else z_max %}

    CLEAR_PAUSE
    SET_DISPLAY_TEXT MSG="Finishing print"
    M400

    # Small tip retract while still above print — prevents blobbing
    {% if printer.extruder.can_extrude %}
        M83
        G92 E0
        G1 E-2.0 F1800              ; tip retract
    {% endif %}

    TURN_OFF_HEATERS
    M141 S0
    M107

    # Move to park position before full retract
    G90
    G0 Z{z_safe} F6000
    G0 X175 F12000
    G0 Y175 F12000

    # Full retract now that toolhead is clear of print
    G1 E-50.0 F4800                 ; full filament retract
    
    SET_GCODE_OFFSET Z=0

    # Restore standby light levels
    SET_PIN PIN=chamber_light VALUE=0.20
    SET_PIN PIN=electronics_bay_light VALUE=0.15

    MS_PRINT_COMPLETE
    SET_DISPLAY_TEXT MSG="Print complete"

    # Keep Nevermore running for 9 minutes after print end
    UPDATE_DELAYED_GCODE ID=NEVERMORE_SHUTOFF DURATION=540

    M84 X Y E
