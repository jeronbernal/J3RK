# =========================================================
# Utility Macros — Annex K3
# =========================================================

# ---------------------------------------------------------
# Homing helpers
# ---------------------------------------------------------

[gcode_macro _CG28]
description: Home only if not already homed
gcode:
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28 METHOD=PROXIMITY
    {% endif %}

[gcode_macro _CQGL]
description: Compatibility wrapper — uses Z_TILT on this printer
gcode:
    Z_TILT_ADJUST

[gcode_macro G32]
description: Full home + Z_TILT for Annex K3
gcode:
    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0
    G90

    SET_DISPLAY_TEXT MSG="Homing"
    MS_HOMING
    G28 METHOD=PROXIMITY
    G28 Z METHOD=PROXIMITY

    SET_DISPLAY_TEXT MSG="Z Tilt"
    MS_Z_TILT
    Z_TILT_ADJUST

    G28 Z METHOD=PROXIMITY
    G0 X90 Y90 Z10 F18000
    MS_STANDBY

# ---------------------------------------------------------
# Park positions
# ---------------------------------------------------------

[gcode_macro PARKFRONT]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKFRONT
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} Z{printer.toolhead.axis_maximum.z/2} F19500
    RESTORE_GCODE_STATE NAME=PARKFRONT

[gcode_macro PARKFRONTLOW]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKFRONTLOW
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} Z20 F19500
    RESTORE_GCODE_STATE NAME=PARKFRONTLOW

[gcode_macro PARKREAR]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKREAR
    G90
    G0 X{printer.toolhead.axis_minimum.x+10} Y{printer.toolhead.axis_maximum.y-10} Z{printer.toolhead.axis_maximum.z-50} F19500
    RESTORE_GCODE_STATE NAME=PARKREAR

[gcode_macro PARKCENTER]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKCENTER
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z{printer.toolhead.axis_maximum.z/2} F19500
    RESTORE_GCODE_STATE NAME=PARKCENTER

[gcode_macro PARKBED]
gcode:
    _CG28
    SAVE_GCODE_STATE NAME=PARKBED
    G90
    G0 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_maximum.y/2} Z15 F19500
    RESTORE_GCODE_STATE NAME=PARKBED

# ---------------------------------------------------------
# Preheat / prime
# ---------------------------------------------------------

[gcode_macro PREHEAT]
description: Preheat bed and chamber for a given material. Usage: PREHEAT MATERIAL=ABS
gcode:
    {% set material = params.MATERIAL|default("")|string %}
    {% set profiles = printer["gcode_macro _PREHEAT_PROFILES"].profiles %}

    {% if material != "" and material not in profiles %}
        RESPOND TYPE=echo MSG="No preheat profile for {material} — using defaults (Bed: 90c  Chamber: 80c)"
    {% endif %}

    {% set profile = profiles[material] if material in profiles else {'bed': 90, 'chamber': 80} %}
    {% set bed_temp = profile.bed %}
    {% set chamber_temp = profile.chamber %}

    {% if material == "" %}
        RESPOND MSG="No material specified — using defaults (Bed: {bed_temp}c  Chamber: {chamber_temp}c)"
    {% else %}
        RESPOND MSG="Preheating for {material} — Bed: {bed_temp}c  Chamber: {chamber_temp}c"
    {% endif %}

    G90
    _CG28
    G0 X90 Y90 Z30 F3600
    M106 S204                                      # Part fan 80% (204/255)

    SET_FAN_SPEED FAN=nevermore SPEED=1.0
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bed_temp}

    {% if chamber_temp > 0 %}
        SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={chamber_temp}
    {% endif %}

[gcode_macro PRIME_NOZZLE]
description: Manual prime line — only runs if hotend is at temp
gcode:
    {% if not printer.extruder.can_extrude %}
        RESPOND TYPE=error MSG="Extruder not hot enough to prime"
    {% else %}
        SAVE_GCODE_STATE NAME=PRIME_NOZZLE_STATE
        M117 Priming
        G90
        M83
        G92 E0
        G1 Z5 F900
        G1 Y3 X3 F27000
        G1 Z0.2 F900
        G91
        G1 X100 E25 F1000
        G1 Y2 F1000
        G1 X-60 E9 F1000
        G1 E-0.5 F3000
        G1 X0.5 E0 F1000
        G1 X-5.5 E0 F1000
        RESTORE_GCODE_STATE NAME=PRIME_NOZZLE_STATE
    {% endif %}

# ---------------------------------------------------------
# Lights
# ---------------------------------------------------------

[gcode_macro LIGHTS_ON]
description: Standby light levels. Optional CHAMBER= and ELEC= params (0.0-1.0), defaults 0.2 and 0.15
gcode:
    {% set chamber = params.CHAMBER|default(0.2)|float %}
    {% set elec = params.ELEC|default(0.15)|float %}
    SET_PIN PIN=chamber_light VALUE={chamber}
    SET_PIN PIN=electronics_bay_light VALUE={elec}

[gcode_macro LIGHTS_MAX_ON]
description: Full brightness — chamber 100%, electronics bay 60%
gcode:
    SET_PIN PIN=chamber_light VALUE=1.0
    SET_PIN PIN=electronics_bay_light VALUE=0.60

[gcode_macro LIGHTS_OFF]
gcode:
    SET_PIN PIN=chamber_light VALUE=0
    SET_PIN PIN=electronics_bay_light VALUE=0

# ---------------------------------------------------------
# Nevermore
# ---------------------------------------------------------

[gcode_macro NEVERMORE_ON]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=1.0

[gcode_macro NEVERMORE_OFF]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0.0

# ---------------------------------------------------------
# XY driver temperature dump
# ---------------------------------------------------------

[gcode_macro DUMP_XY_DRIVERS]
description: Dump TMC5160 driver info for all 4 XY steppers
gcode:
    RESPOND MSG="=== stepper_x (Front Right) ==="
    DUMP_TMC STEPPER=stepper_x
    RESPOND MSG="=== stepper_x1 (Rear Left) ==="
    DUMP_TMC STEPPER=stepper_x1
    RESPOND MSG="=== stepper_y (Rear Right) ==="
    DUMP_TMC STEPPER=stepper_y
    RESPOND MSG="=== stepper_y1 (Front Left) ==="
    DUMP_TMC STEPPER=stepper_y1

# ---------------------------------------------------------
# Filament load / unload with heating
# Positions over bucket, heats, loads/unloads, purges, cleans
# All positions and temps controlled via _PURGE_BRUSH_VARS
# ---------------------------------------------------------

[gcode_macro HOT_LOAD]
description: Heat nozzle, load filament, purge into bucket, clean nozzle. Usage: HOT_LOAD TEMP=270
gcode:
    {% set temp = params.TEMP|default(270)|int %}
    {% set v    = printer["gcode_macro _PURGE_BRUSH_VARS"] %}
    {% set ts   = v.travel_speed * 60 %}
    {% set temp = [temp, v.purge_temp_min]|max %}  # never heat below purge minimum

    SAVE_GCODE_STATE NAME=HOT_LOAD_STATE

    # Start heating — don't wait yet so we can home in parallel
    SET_DISPLAY_TEXT MSG="Heating nozzle to {temp}c"
    M104 S{temp}

    # Home if needed while nozzle heats
    {% if "xyz" not in printer.toolhead.homed_axes %}
        SET_DISPLAY_TEXT MSG="Homing"
        G28 METHOD=PROXIMITY
    {% endif %}

    # Move to bucket — any drips or ooze during load fall into the bucket
    G90
    G0 Z{v.z_hop} F{ts}
    G0 X{v.bucket_x} Y{v.bucket_y} F{ts}

    # Wait for temp
    SET_DISPLAY_TEXT MSG="Waiting for {temp}c"
    M109 S{temp}

    # Load filament
    SET_DISPLAY_TEXT MSG="Loading filament"
    M83
    G1 E{v.load_distance} F600

    # Purge directly into bucket — just enough to clear old filament from nozzle
    # No blob formation, no kick
    SET_DISPLAY_TEXT MSG="Purging into bucket"
    G0 Z{v.z_hop} F{ts}
    G0 X{v.bucket_x} Y{v.bucket_y} F{ts}
    G0 Z3 F{ts}
    G1 E30 F{v.purge_speed * 60}
    G1 E-{v.purge_retract} F1800
    G0 Z{v.z_hop} F{ts}

    SET_DISPLAY_TEXT MSG="Load complete"
    RESTORE_GCODE_STATE NAME=HOT_LOAD_STATE


[gcode_macro HOT_UNLOAD]
description: Heat nozzle, move to bucket, tip-form, then unload. Usage: HOT_UNLOAD TEMP=270
gcode:
    {% set temp = params.TEMP|default(270)|int %}
    {% set v    = printer["gcode_macro _PURGE_BRUSH_VARS"] %}
    {% set ts   = v.travel_speed * 60 %}
    {% set temp = [temp, v.purge_temp_min]|max %}  # never heat below purge minimum

    SAVE_GCODE_STATE NAME=HOT_UNLOAD_STATE

    # Start heating — don't wait yet so we can home in parallel
    SET_DISPLAY_TEXT MSG="Heating nozzle to {temp}c"
    M104 S{temp}

    # Home if needed while nozzle heats
    {% if "xyz" not in printer.toolhead.homed_axes %}
        SET_DISPLAY_TEXT MSG="Homing"
        G28 METHOD=PROXIMITY
    {% endif %}

    # Move to bucket — any drips fall into the bucket while heating
    G90
    G0 Z{v.z_hop} F{ts}
    G0 X{v.bucket_x} Y{v.bucket_y} F{ts}

    # Wait for temp
    SET_DISPLAY_TEXT MSG="Waiting for {temp}c"
    M109 S{temp}

    # Tip forming — clean tapered tip that slides back through
    # the extruder gears without curling or bulging
    SET_DISPLAY_TEXT MSG="Forming tip"
    M83
    G1 E5    F300               ; slow push to ensure nozzle is full and tip is fresh
    G1 E-5   F3600              ; fast snap retract to shear a clean tip
    G4 P2000                    ; dwell 2s — let tip cool slightly so it holds its shape
    G1 E-{v.unload_distance} F300               ; slow steady pull up through the extruder — keeps tip intact

    SET_DISPLAY_TEXT MSG="Unload complete — remove filament"
    RESTORE_GCODE_STATE NAME=HOT_UNLOAD_STATE


# ---------------------------------------------------------
# Kill switch — everything off
# ---------------------------------------------------------

[gcode_macro OFF]
gcode:
    M84
    TURN_OFF_HEATERS
    M107
    SET_FAN_SPEED FAN=nevermore SPEED=0
    SET_FAN_SPEED FAN=top_aux_fans SPEED=0
    SET_PIN PIN=chamber_light VALUE=0
    SET_PIN PIN=electronics_bay_light VALUE=0


# ---------------------------------------------------------
# Stepper motor temperature monitor
# Warns at 70c — visual only, does not pause or cancel
# ---------------------------------------------------------

[delayed_gcode STEPPER_TEMP_MONITOR]
initial_duration: 30
gcode:
    {% set temp = printer["temperature_sensor Stepper_Motor_Temp"].temperature %}
    {% if temp >= 110 %}
        RESPOND TYPE=error MSG="⚠ Stepper motor temp HIGH: {temp|round(1)}c — consider pausing"
    {% elif temp >= 106 %}
        RESPOND TYPE=echo MSG="Stepper motor temp: {temp|round(1)}c (watch closely above 110c)"
    {% endif %}
    UPDATE_DELAYED_GCODE ID=STEPPER_TEMP_MONITOR DURATION=30
