[gcode_macro PRINT_START]
description: Annex K3 print start — Beacon staged homing, Z_TILT, adaptive bed mesh, chamber soak, Matchstick LEDs, 60% chamber / 15% elec bay lights
gcode:
    {% set target_bed = params.BED|int %}
    {% set target_extruder = params.EXTRUDER|int %}
    {% set target_chamber = params.CHAMBER|default("0")|int %}
    {% set start_chambertemp = target_chamber - 10 %}           # Pre-warm threshold: start heating 10c below target
    {% set material = params.MATERIAL|default("")|string %}
    {% set bed_type = params.BED_TYPE|default("")|string %}
    {% set filament = params.FILAMENT|default("")|string %}
    {% set nozzle = params.NOZZLE|default(0.4)|float %}

    {% set x_wait = printer.toolhead.axis_maximum.x|float / 2 %}
    {% set y_wait = printer.toolhead.axis_maximum.y|float / 2 %}

    # Pass bed and extruder targets into M191 so it can assist with chamber heating
    SET_GCODE_VARIABLE MACRO=M191 VARIABLE=target_bed VALUE={ target_bed }
    SET_GCODE_VARIABLE MACRO=M191 VARIABLE=target_extruder VALUE={ target_extruder }

    CLEAR_PAUSE
    SET_GCODE_OFFSET Z=0

    # Lights at 60% chamber, 15% electronics bay
    SET_PIN PIN=chamber_light VALUE=0.60
    SET_PIN PIN=electronics_bay_light VALUE=0.15

    MS_STANDBY

    # Nevermore: cancel any pending shutdown and turn on for this print
    UPDATE_DELAYED_GCODE ID=NEVERMORE_SHUTOFF DURATION=0
    SET_FAN_SPEED FAN=nevermore SPEED=1.0

    # =================================================
    # Initial homing BEFORE heating
    # =================================================
    SET_DISPLAY_TEXT MSG="Homing"
    MS_HOMING
    G28 METHOD=PROXIMITY

    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=0
    G90

    BED_MESH_CLEAR

    # Park at center low so bed and chamber heater can do their work
    G0 X{x_wait} Y{y_wait} Z2 F9000

    # =================================================
    # Heating / soak
    # =================================================
    {% if target_bed > 80 %}
        SET_DISPLAY_TEXT MSG="Chamber: {target_chamber}c - Bed: {target_bed}c - Extruder: {target_extruder}c"
        MS_BED_PREHEAT

        # M191 handles chamber heater, bed assist, extruder assist, and the wait
        M191 S{target_chamber}
        M106 S140                           # Parts fan on after soak to circulate air

    {% else %}
        SET_DISPLAY_TEXT MSG="Bed: {target_bed}c - Extruder: {target_extruder}c"
        MS_BED_PREHEAT

        M109 S170                           # Light nozzle preheat to soften any ooze
        M190 S{target_bed}

        # Start chamber heater if a target was given, then timed soak
        {% if target_chamber > 0 %}
            M141 S{target_chamber}
        {% endif %}

        SET_DISPLAY_TEXT MSG="3 Minute Heatsoak"
        G4 P180000
    {% endif %}

    # Turn off parts fan before calibration moves
    M107
    RESPOND MSG="Calibrating"

    # =================================================
    # Contact Z calibration + Z_TILT
    # =================================================
    SET_DISPLAY_TEXT MSG="Cleaning nozzle"
    CLEAN_NOZZLE

    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=1

    SET_DISPLAY_TEXT MSG="Z Tilt"
    MS_Z_TILT
    Z_TILT_ADJUST

    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=0

    # =================================================
    # Bed mesh
    # =================================================
    SET_DISPLAY_TEXT MSG="Bed mesh"
    MS_BED_MESH
    BED_MESH_CALIBRATE ADAPTIVE=1 RUNS=2

    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=0

    # =================================================
    # Final nozzle heat
    # =================================================
    SET_DISPLAY_TEXT MSG="Hotend: {target_extruder}c"
    MS_HOTEND_PREHEAT
    M109 S{target_extruder}

    # =================================================
    # Wipe nozzle before final Z contact calibration
    # Clean tip = accurate beacon contact reading
    # =================================================
    SET_DISPLAY_TEXT MSG="Cleaning nozzle"
    CLEAN_NOZZLE

    # =================================================
    # Final beacon contact Z calibration — clean tip
    # =================================================
    SET_DISPLAY_TEXT MSG="Final Z contact calibration"
    MS_Z_CONTACT
    G28 Z METHOD=CONTACT CALIBRATE=1

    SET_GCODE_OFFSET Z=0.03

    # =================================================
    # Per-material Z offset — edit config/material_offsets.cfg
    # =================================================
    {% set z_offsets = printer["gcode_macro _MATERIAL_Z_OFFSETS"].offsets %}
    {% if material in z_offsets %}
        RESPOND MSG="Adjusting Z offset for {material} ({z_offsets[material]}mm)"
        SET_GCODE_OFFSET Z_ADJUST={z_offsets[material]} MOVE=1
    {% elif material != "" %}
        RESPOND TYPE=echo MSG="No Z offset defined for {material} — using default"
    {% endif %}

    # =================================================
    # Per-bed-type Z offset — edit config/bed_offsets.cfg
    # =================================================
    {% set bed_offsets = printer["gcode_macro _BED_TYPE_Z_OFFSETS"].offsets %}
    {% if bed_type in bed_offsets %}
        RESPOND MSG="Adjusting Z offset for bed type {bed_type} ({bed_offsets[bed_type]}mm)"
        SET_GCODE_OFFSET Z_ADJUST={bed_offsets[bed_type]} MOVE=1
    {% elif bed_type != "" %}
        RESPOND TYPE=echo MSG="No Z offset defined for bed type {bed_type} — using default"
    {% endif %}

    SET_DISPLAY_TEXT MSG="Printer go Brrrrrr"
    MS_PRINTING

    # Safety wait before print starts
    M109 S{target_extruder}

    PURGE_AND_CLEAN
