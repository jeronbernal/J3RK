# =========================================================
# Filament & Print Flow Macros
# NOTE: CANCEL_PRINT, PAUSE, and RESUME are defined in
# mainsail.cfg. Use _CLIENT_VARIABLE below to customize
# their behaviour — do not redefine them here.
# =========================================================

# ---------------------------------------------------------
# Mainsail client variable hooks
# Tells Mainsail's CANCEL_PRINT/PAUSE/RESUME what to call
# ---------------------------------------------------------
[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : False
variable_custom_park_x    : 0.0
variable_custom_park_y    : 0.0
variable_custom_park_dz   : 2.0
variable_retract          : 1.0
variable_cancel_retract   : 2.0
variable_speed_retract    : 35.0
variable_unretract        : 1.0
variable_speed_unretract  : 35.0
variable_speed_hop        : 15.0
variable_speed_move       : 100.0
variable_park_at_cancel   : True
variable_park_at_cancel_x : 175.0
variable_park_at_cancel_y : 175.0
variable_use_fw_retract   : False
variable_idle_timeout     : 43200
variable_user_pause_macro : "MS_PAUSED"
variable_user_resume_macro: "MS_PRINTING"
variable_user_cancel_macro: "PRINT_END"
gcode:

# ---------------------------------------------------------
# Filament runout / change
# ---------------------------------------------------------
[gcode_macro M600]
gcode:
    PAUSE

# ---------------------------------------------------------
# Filament load / unload (hotend must already be at temp)
# ---------------------------------------------------------
[gcode_macro UNLOAD_FILAMENT]
description: Unload filament — requires hotend already at temp
gcode:
    SAVE_GCODE_STATE NAME=UNLOADFILAMENT
    M83
    G1 E10 F600                 ; extrude a little to soften tip
    G1 E-15 F1800               ; quick initial retract to form tip
    G1 E5 F900                  ; slight forward move
    G1 E-70 F1800               ; full retract
    RESTORE_GCODE_STATE NAME=UNLOADFILAMENT

[gcode_macro LOAD_FILAMENT]
description: Load filament — requires hotend already at temp
gcode:
    SAVE_GCODE_STATE NAME=LOADFILAMENT
    M83
    G1 E70 F600
    RESTORE_GCODE_STATE NAME=LOADFILAMENT

# ---------------------------------------------------------
# HOT_LOAD and HOT_UNLOAD are in:
#   macros/utility_macros.cfg
# ---------------------------------------------------------
