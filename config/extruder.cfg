# =========================================================
# Extruder — S8 on Kraken
# =========================================================

[extruder]
step_pin: PG15         # S8 step
dir_pin: PB6          # S8 dir (confirm polarity)
enable_pin: !PG14      # S8 enable
full_steps_per_rotation: 200
microsteps: 16
rotation_distance: 21.446747
gear_ratio: 50:8
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PF6        # HE0 on Kraken
# HE thermistor — PT1000 on Dinghy PB1 with 2200 ohm pullup
sensor_type: PT1000
sensor_pin: Dinghy:PB1
pullup_resistor: 2200
min_temp: 0
max_temp: 350
min_extrude_temp: 170
max_extrude_only_distance: 1400
max_extrude_only_accel: 2000
max_extrude_only_velocity: 120
max_extrude_cross_section: 5.0
pressure_advance: 0.020
pressure_advance_smooth_time: 0.020
heater_power: 75
# cooling_fan removed — conduction cooled hotend, no fan needed
filament_heat_capacity: 1.8
maximum_retract: 2.5
pwm_cycle_time: 0.02

[tmc5160 extruder]
cs_pin: PA10           # S8 CS on Kraken
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
run_current: 0.65
sense_resistor: 0.075  # S5-S8 on Kraken V1.1
stealthchop_threshold: 0
interpolate: True

[verify_heater extruder]
max_error: 500
check_gain_time: 120
hysteresis: 50
heating_gain: 2
