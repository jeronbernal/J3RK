# =========================================================
# Z Steppers — Annex K3 / BTT Kraken V1.1
# Breakout board on S5-S7 (Rsense=0.075)
# =========================================================
#
# Z  = Front Left  = Breakout Motor4 = Kraken S5
# Z1 = Rear        = Breakout Motor5 = Kraken S6
# Z2 = Front Right = Breakout Motor6 = Kraken S7
# =========================================================

# ---------------------------------------------------------
# Z — Front Left — S5 on Kraken
# ---------------------------------------------------------
[stepper_z]
step_pin: PG9          # S5 step
dir_pin: !PG10          # S5 dir
enable_pin: !PG13      # S5 enable
full_steps_per_rotation: 200
microsteps: 64
rotation_distance: 40
gear_ratio: 5:1
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 189
homing_speed: 15
second_homing_speed: 25
homing_retract_dist: 0

[tmc5160 stepper_z]
cs_pin: PD2            # S5 CS
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
run_current: 0.8
sense_resistor: 0.075  # S5-S8 on Kraken V1.1
stealthchop_threshold: 0
interpolate: true

# ---------------------------------------------------------
# Z1 — Rear — S6 on Kraken
# ---------------------------------------------------------
[stepper_z1]
step_pin: PG11         # S6 step
dir_pin: !PD7           # S6 dir
enable_pin: !PG12      # S6 enable
full_steps_per_rotation: 200
microsteps: 64
rotation_distance: 40
gear_ratio: 5:1

[tmc5160 stepper_z1]
cs_pin: PA15           # S6 CS
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
run_current: 0.8
sense_resistor: 0.075
stealthchop_threshold: 0
interpolate: true

# ---------------------------------------------------------
# Z2 — Front Right — S7 on Kraken
# ---------------------------------------------------------
[stepper_z2]
step_pin: PB4          # S7 step
dir_pin: PB3          # S7 dir
enable_pin: !PB5       # S7 enable
full_steps_per_rotation: 200
microsteps: 64
rotation_distance: 40
gear_ratio: 5:1

[tmc5160 stepper_z2]
cs_pin: PA9            # S7 CS
spi_software_sclk_pin: PC6
spi_software_mosi_pin: PC8
spi_software_miso_pin: PC7
run_current: 0.8
sense_resistor: 0.075
stealthchop_threshold: 0
interpolate: true
