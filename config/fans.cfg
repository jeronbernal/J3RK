# =========================================================
# Fans — BTT Octopus Pro V1.1 H723
# =========================================================
#
# FAN0  PA8  → PCF (part cooling)
# FAN1  PE5  → Filter fan (Nevermore)
# FAN2  PD12 → PTC heater circulation fan
# FAN3  PD13 → Chamber LED (PWM output)
# FAN4  PD14 → Camera fan
# HE2   PB0  → Top aux chamber fans
# PB4        → Electronics bay LED (GPIO output)
# =========================================================

# Part cooling fan — FAN0
[fan]
pin: PA8
kick_start_time: 0.5

# Filter fan (Nevermore) — FAN1
[fan_generic nevermore]
pin: PE5
kick_start_time: 0.5

# PTC chamber heater circulation fan — FAN2
[heater_fan chamber_heater_fan]
pin: PD12
heater: chamber_heater
heater_temp: 50.0
fan_speed: 1.0

# Chamber LED — FAN3 (PWM output)
[controller_fan chamber_light]
pin: PD13
hardware_pwm: False
cycle_time: 0.010
stepper: stepper_x, stepper_x1, stepper_y, stepper_y1, stepper_z, stepper_z1, stepper_z2, extruder
heater: extruder, heater_bed, chamber_heater
fan_speed: 0.60
idle_speed: 0.0
idle_timeout: 30
shutdown_speed: 0

# Camera fan — FAN4
[heater_fan camera_fan]
pin: PD14
kick_start_time: 0.5
heater: chamber_heater
heater_temp: 50
fan_speed: 1.0

# Top aux chamber fans — HE2
[fan_generic top_aux_fans]
pin: PB0
kick_start_time: 0.5

# Electronics bay LED — Dinghy PB4
[controller_fan electronics_bay_light]
pin: Dinghy:PB4
hardware_pwm: False
cycle_time: 0.010
stepper: stepper_x, stepper_x1, stepper_y, stepper_y1, stepper_z, stepper_z1, stepper_z2, extruder
heater: extruder, heater_bed, chamber_heater
fan_speed: 0.20
idle_speed: 0.0
idle_timeout: 30
shutdown_speed: 0

# Electronics bay cooling — FAN5
# (kept from Kraken config — wire to FAN5 header)
[controller_fan electronics_bay_fan]
pin: PD15
kick_start_time: 0.5
fan_speed: 1.0
idle_speed: 0.4
idle_timeout: 60
stepper: stepper_x, stepper_x1, stepper_y, stepper_y1, stepper_z, stepper_z1, stepper_z2, extruder
heater: extruder, heater_bed
