# =========================================================
# Fans
# =========================================================

# Hotend cooling fan — auto on above 50°C
[heater_fan hotend_fan]
pin: PA8
heater: extruder
heater_temp: 50.0
fan_speed: 1.0

# Part cooling fan
[fan]
pin: PE5
kick_start_time: 0.5

# Nevermore carbon filter
[fan_generic nevermore]
pin: PD13
kick_start_time: 0.5

# Electronics bay cooling — idles at 40% when steppers/heaters are active
[controller_fan electronics_bay_fan]
pin: PD15
kick_start_time: 0.5
fan_speed: 1.0
idle_speed: 0.4
idle_timeout: 60
stepper: stepper_x, stepper_x1, stepper_y, stepper_y1, stepper_z, stepper_z1, stepper_z2, extruder
heater: extruder, heater_bed

# Chamber heater circulation fan — auto on above 50°C
[heater_fan chamber_heater_fan]
pin: PD14                 # FAN4 on Octopus Pro 1.1
heater: chamber_heater
heater_temp: 50.0
fan_speed: 1.0

# Top aux fans — speed controlled by macros/top_aux_fans.cfg macro logic
[fan_generic top_aux_fans]
pin: PD12
kick_start_time: 0.5
# cycle_time: 0.05
