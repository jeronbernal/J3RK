# =========================================================
# Annex K3 - BTT Octopus Pro V1.1 H723 + Beacon RevH
# =========================================================
#
# Physical layout:
#
# |------------------------|
# |        BACKPACK        |
# |------------------------|
# | Y  |    | Z1 |    | X1 |
# |-----    ------    -----|
# |                        |
# | ------          ------ |
# | | Z  |          | Z2 | |
# | ------          ------ |
# |-----              -----|
# | X  |              | Y1 |
# |------------------------|
#
# XY:  X=Front Left  (MOT2)  X1=Rear Right (MOT1)
#      Y=Rear Left   (MOT3)  Y1=Front Right (MOT0)
# Z:   Z=Front Left  (MOT4)  Z1=Rear (MOT5)  Z2=Front Right (MOT6)
# E:   Extruder (MOT7)
#
# MOT0-MOT3: BTT 5160 Plus (SPI, spi_bus=spi1, Rsense=0.075)
# MOT4-MOT7: TMC2209 (UART)
# =========================================================

# =========================================================
# Klipper core
# [virtual_sdcard], [display_status], and [pause_resume]
# are defined in mainsail.cfg — do not redefine them here
# =========================================================
[exclude_object]
[gcode_arcs]
resolution: 0.5

[save_variables]
filename: ~/printer_data/config/variables.txt

# =========================================================
# Printer kinematics & limits
# =========================================================
[printer]
kinematics: cartesian
max_velocity: 550
max_accel: 22000
max_z_velocity: 30
max_z_accel: 300
square_corner_velocity: 10

# =========================================================
# Includes — third-party / extras
# =========================================================
[include mainsail.cfg]
[include KAMP_Settings.cfg]
[include config/autotune_tmc.cfg]

# =========================================================
# Includes — hardware config
# =========================================================
[include config/mcu.cfg]
[include config/xy_steppers.cfg]
[include config/z_steppers.cfg]
[include config/extruder.cfg]
[include config/bed.cfg]
[include config/fans.cfg]
[include config/beacon.cfg]
[include config/bed_mesh.cfg]
[include config/z_tilt.cfg]
[include config/leds.cfg]
[include config/input_shaper.cfg]
[include config/temperature_sensors.cfg]
[include config/chamber_heater.cfg]
[include config/DragonDinghy.cfg]
[include config/material_offsets.cfg]
[include config/bed_offsets.cfg]
[include config/preheat_profiles.cfg]

# =========================================================
# Includes — macros
# =========================================================
[include macros/print_start.cfg]
[include macros/print_end.cfg]
[include macros/cancel_pause_resume.cfg]
[include macros/utility_macros.cfg]
[include macros/purge_brush.cfg]
[include macros/chamber_macros.cfg]
[include macros/led_macros.cfg]
[include macros/top_aux_fans.cfg]
[include macros/ShakeTune.cfg]
[include macros/TEST_SPEED.cfg]
[include macros/button_unload.cfg]

# =========================================================
# Idle timeout
# =========================================================
[idle_timeout]
timeout: 1200
gcode:
    M84                                 # Disable steppers
    TURN_OFF_HEATERS
    SET_FAN_SPEED FAN=chamber_light SPEED=0.0
    SET_FAN_SPEED FAN=electronics_bay_light SPEED=0.0
    MS_STANDBY

