# =========================================================
# Top Aux Fans — Annex K3
# Controlled via OrcaSlicer auxiliary fan (M106 P2 S<value>)
# or directly via SET_FAN_SPEED FAN=top_aux_fans SPEED=x
#
# NOTE: All bed fan logic has been removed. The old
# top_aux_fans.cfg had SET_HEATER_TEMPERATURE, M190, M140,
# and TURN_OFF_HEATERS overrides that interfered with aux
# fan speed during print_start soak. Those are all gone.
# =========================================================

# M106 override — routes P2 to top_aux_fans, P0 to part cooling
[gcode_macro M106]
rename_existing: M106.1
gcode:
    {% set port = params.P|default(0)|int %}
    {% set speed = params.S|default(255)|int %}
    {% set fan_speed = speed / 255.0 %}

    {% if port == 2 %}
        SET_FAN_SPEED FAN=top_aux_fans SPEED={fan_speed}
    {% else %}
        M106.1 S{speed}
    {% endif %}

# M107 override — turns off both part cooling and top aux fans
[gcode_macro M107]
rename_existing: M107.1
gcode:
    SET_FAN_SPEED FAN=top_aux_fans SPEED=0
    M107.1
