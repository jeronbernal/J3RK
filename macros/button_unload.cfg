# =========================================================
# Button Handler — PG15 (STOP7 on Octopus Pro v1.1)
# =========================================================
#   Double-click  (within 0.5 s)  →  HOT_LOAD
#   Hold 3 seconds                →  HOT_UNLOAD
#   Single tap                    →  nothing (accidental-press guard)
# =========================================================

[gcode_button unload_button]
pin: ^PG15                   # STOP7 on Octopus Pro v1.1
press_gcode:
    _BTN_HANDLER STATE=1
release_gcode:
    _BTN_HANDLER STATE=0

# =========================================================
# Internal state variables
# =========================================================

[gcode_macro _BTN_VARS]
variable_armed:       False
variable_click_count: 0
gcode:    # required by Klipper — intentionally empty

# =========================================================
# Called on every button state change
# STATE=1 → pressed down   STATE=0 → released
# =========================================================

[gcode_macro _BTN_HANDLER]
description: Handler for PG15 button events
gcode:
    {% set state = params.STATE|int %}

    {% if state == 1 %}
        # ── Button down ──────────────────────────────────────────
        SET_GCODE_VARIABLE MACRO=_BTN_VARS VARIABLE=armed VALUE=True
        UPDATE_DELAYED_GCODE ID=_BTN_HOLD_CHECK DURATION=3.0

    {% else %}
        # ── Button released ───────────────────────────────────────
        {% if printer["gcode_macro _BTN_VARS"].armed %}
            SET_GCODE_VARIABLE MACRO=_BTN_VARS VARIABLE=armed VALUE=False
            UPDATE_DELAYED_GCODE ID=_BTN_HOLD_CHECK DURATION=0

            {% set clicks = printer["gcode_macro _BTN_VARS"].click_count + 1 %}
            SET_GCODE_VARIABLE MACRO=_BTN_VARS VARIABLE=click_count VALUE={clicks}

            {% if clicks == 1 %}
                RESPOND TYPE=echo MSG="Tap 1 — double-click for HOT_LOAD, hold 3s for HOT_UNLOAD"
                UPDATE_DELAYED_GCODE ID=_BTN_CLICK_WINDOW DURATION=0.5
            {% elif clicks >= 2 %}
                UPDATE_DELAYED_GCODE ID=_BTN_CLICK_WINDOW DURATION=0
                SET_GCODE_VARIABLE MACRO=_BTN_VARS VARIABLE=click_count VALUE=0
                RESPOND TYPE=echo MSG="Double-click — running HOT_LOAD"
                HOT_LOAD
            {% endif %}
        {% endif %}
    {% endif %}

# =========================================================
# Fires if 0.5s passes after first tap with no second tap
# → single tap, do nothing, reset counter
# =========================================================

[delayed_gcode _BTN_CLICK_WINDOW]
gcode:
    SET_GCODE_VARIABLE MACRO=_BTN_VARS VARIABLE=click_count VALUE=0

# =========================================================
# Fires 3 seconds after button-down if still held
# =========================================================

[delayed_gcode _BTN_HOLD_CHECK]
gcode:
    {% if printer["gcode_macro _BTN_VARS"].armed %}
        SET_GCODE_VARIABLE MACRO=_BTN_VARS VARIABLE=armed VALUE=False
        SET_GCODE_VARIABLE MACRO=_BTN_VARS VARIABLE=click_count VALUE=0
        UPDATE_DELAYED_GCODE ID=_BTN_CLICK_WINDOW DURATION=0
        RESPOND TYPE=echo MSG="3s hold — running HOT_UNLOAD"
        HOT_UNLOAD
    {% endif %}
