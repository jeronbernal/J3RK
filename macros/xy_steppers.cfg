# =========================================================
# XY Steppers — Annex K3 / BTT Octopus Pro V1.1 H723
# MOT0-MOT3: BTT 5160 Plus (SPI, Rsense=0.075)
# =========================================================
#
# Y1 = Front Right = MOT0
# X1 = Rear Right  = MOT1
# X  = Front Left  = MOT2
# Y  = Rear Left   = MOT3
# =========================================================

# SPI bus shared by all 5160 Plus drivers
# spi_bus: spi1 (MOSI=PA7, MISO=PA6, SCK=PA5 — hardware SPI)

# ---------------------------------------------------------
# Y1 — Front Right — MOT0
# ---------------------------------------------------------
[stepper_y1]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40

[tmc5160 stepper_y1]
cs_pin: PC4
spi_bus: spi1
sense_resistor: 0.022        # BTT 5160 Plus
interpolate: True
run_current: 1.8
stealthchop_threshold: 0

# ---------------------------------------------------------
# X1 — Rear Right — MOT1
# ---------------------------------------------------------
[stepper_x1]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40

[tmc5160 stepper_x1]
cs_pin: PD11
spi_bus: spi1
sense_resistor: 0.022
interpolate: True
run_current: 1.8
stealthchop_threshold: 0

# ---------------------------------------------------------
# X — Front Left — MOT2
# ---------------------------------------------------------
[stepper_x]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40
endstop_pin: ^PG10           # STOP2 on Octopus Pro v1.1
position_min: -7
position_endstop: 180
position_max: 180
homing_speed: 100
homing_retract_dist: 10
homing_positive_dir: true

[tmc5160 stepper_x]
cs_pin: PC6
spi_bus: spi1
sense_resistor: 0.022
interpolate: True
run_current: 1.8
stealthchop_threshold: 0

# ---------------------------------------------------------
# Y — Rear Left — MOT3
# ---------------------------------------------------------
[stepper_y]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA0
full_steps_per_rotation: 200
microsteps: 32
rotation_distance: 40
endstop_pin: ^PG11           # STOP3 on Octopus Pro v1.1
position_min: 0
position_endstop: 185
position_max: 185
homing_speed: 100
homing_retract_dist: 10
homing_positive_dir: true

[tmc5160 stepper_y]
cs_pin: PC7
spi_bus: spi1
sense_resistor: 0.022
interpolate: True
run_current: 1.8
stealthchop_threshold: 0
