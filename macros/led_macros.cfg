# =========================================================
# Matchstick LED Macros
# Effects defined in config/leds.cfg
# All macros call STOP_LED_EFFECTS before starting a new
# effect to ensure nothing is left running underneath.
# =========================================================

# ---------------------------------------------------------
# Light brightness targets — used by auto-on logic
# Set these to change what "active" and "off" mean.
# ---------------------------------------------------------
[gcode_macro _LIGHT_VARS]
variable_chamber_active: 0.60
variable_elec_active: 0.20
gcode:

# ---------------------------------------------------------
# Auto light control — polls every 2s
# Turns lights on when any stepper is enabled or any
# heater is active, off when everything is idle.
# ---------------------------------------------------------
[delayed_gcode LIGHTS_AUTO]
initial_duration: 2
gcode:
    {% set v = printer["gcode_macro _LIGHT_VARS"] %}
    {% set steppers_on = printer.motion_report.live_velocity > 0
                         or printer.toolhead.homed_axes != "" %}
    {% set heaters_on = printer.extruder.target > 0
                        or printer.heater_bed.target > 0
                        or printer["heater_generic chamber_heater"].target > 0 %}
    {% set active = steppers_on or heaters_on %}
    {% set chamber_now = printer["fan_generic chamber_light"].speed %}
    {% set elec_now = printer["fan_generic electronics_bay_light"].speed %}

    {% if active and chamber_now == 0 %}
        SET_FAN_SPEED FAN=chamber_light SPEED={v.chamber_active}
        SET_FAN_SPEED FAN=electronics_bay_light SPEED={v.elec_active}
    {% endif %}
    UPDATE_DELAYED_GCODE ID=LIGHTS_AUTO DURATION=2

# Boot — rainbow comet, then settle to standby
[delayed_gcode BOOT_LIGHTS]
initial_duration: 1.0
gcode:
    SET_FAN_SPEED FAN=chamber_light SPEED=0.20
    SET_FAN_SPEED FAN=electronics_bay_light SPEED=0.15
    SET_LED_EFFECT EFFECT=ms_boot
    UPDATE_DELAYED_GCODE ID=BOOT_TO_STANDBY DURATION=3

[delayed_gcode BOOT_TO_STANDBY]
gcode:
    MS_STANDBY

# ---------------------------------------------------------
# State macros
# ---------------------------------------------------------

[gcode_macro MS_STANDBY]
gcode:
    STOP_LED_EFFECTS
    SET_LED_EFFECT EFFECT=ms_standby

