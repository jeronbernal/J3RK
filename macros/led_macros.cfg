# ---------------------------------------------------------
# Solid fill gauge pollers — no LED-Effects heatergauge,
# just direct SET_LED calls every 2 seconds.
# Bed gauge: dim red base, bright red fill (R=1.0 G=0.2 B=0.0)
# Hotend gauge: dim orange base, bright orange fill (R=1.0 G=0.4 B=0.0)
# ---------------------------------------------------------

[delayed_gcode _BED_PREHEAT_GAUGE]
gcode:
    {% set target = printer.heater_bed.target %}
    {% set current = printer.heater_bed.temperature %}
    {% set pct = (current / target) if target > 0 else 0 %}
    {% set lit = (pct * 10)|int %}
    {% for i in range(1, 11) %}
        {% if i <= lit %}
            SET_LED LED=matchstick INDEX={i} RED=1.0 GREEN=0.2 BLUE=0.0 TRANSMIT=0
        {% else %}
            SET_LED LED=matchstick INDEX={i} RED=0.05 GREEN=0.01 BLUE=0.0 TRANSMIT=0
        {% endif %}
    {% endfor %}
    SET_LED LED=matchstick INDEX=10 RED={ 1.0 if 10 <= lit else 0.05 } GREEN={ 0.2 if 10 <= lit else 0.01 } BLUE=0.0 TRANSMIT=1
    {% if target > 0 and current < target %}
        UPDATE_DELAYED_GCODE ID=_BED_PREHEAT_GAUGE DURATION=2
    {% endif %}

[delayed_gcode _HOTEND_PREHEAT_GAUGE]
gcode:
    {% set target = printer.extruder.target %}
    {% set current = printer.extruder.temperature %}
    {% set pct = (current / target) if target > 0 else 0 %}
    {% set lit = (pct * 10)|int %}
    {% for i in range(1, 11) %}
        {% if i <= lit %}
            SET_LED LED=matchstick INDEX={i} RED=1.0 GREEN=0.4 BLUE=0.0 TRANSMIT=0
        {% else %}
            SET_LED LED=matchstick INDEX={i} RED=0.05 GREEN=0.01 BLUE=0.0 TRANSMIT=0
        {% endif %}
    {% endfor %}
    SET_LED LED=matchstick INDEX=10 RED={ 1.0 if 10 <= lit else 0.05 } GREEN={ 0.4 if 10 <= lit else 0.01 } BLUE=0.0 TRANSMIT=1
    {% if target > 0 and current < target %}
        UPDATE_DELAYED_GCODE ID=_HOTEND_PREHEAT_GAUGE DURATION=2
    {% endif %}
