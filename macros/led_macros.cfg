# =========================================================
# Boot lights — runs once at Klipper startup
# Plays a rainbow comet sweep for 3 seconds, then settles
# into warm white standby
# =========================================================

[delayed_gcode BOOT_LIGHTS]
initial_duration: 1.0
gcode:
    SET_PIN PIN=chamber_light VALUE=0.20
    SET_PIN PIN=electronics_bay_light VALUE=0.15
    SET_LED_EFFECT EFFECT=ms_boot
    UPDATE_DELAYED_GCODE ID=BOOT_TO_STANDBY DURATION=3

[delayed_gcode BOOT_TO_STANDBY]
gcode:
    MS_STANDBY

# =========================================================
