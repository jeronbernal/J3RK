# ---------------------------------------------------------
# Temp gauge pollers — update LEDs every 2 seconds
# Uses direct SET_LED for a clean hard-edged fill bar
# ---------------------------------------------------------

[delayed_gcode _BED_PREHEAT_GAUGE]
gcode:
    {% set cur = printer.heater_bed.temperature %}
    {% set tgt = printer.heater_bed.target %}
    {% if tgt > 0 %}
        {% set lit = [[((cur / tgt) * 10)|int, 0]|max, 10]|min %}
        SET_LED LED=matchstick INDEX=1  RED={ 1.0 if lit >= 1  else 0.04 } GREEN={ 0.2 if lit >= 1  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=2  RED={ 1.0 if lit >= 2  else 0.04 } GREEN={ 0.2 if lit >= 2  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=3  RED={ 1.0 if lit >= 3  else 0.04 } GREEN={ 0.2 if lit >= 3  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=4  RED={ 1.0 if lit >= 4  else 0.04 } GREEN={ 0.2 if lit >= 4  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=5  RED={ 1.0 if lit >= 5  else 0.04 } GREEN={ 0.2 if lit >= 5  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=6  RED={ 1.0 if lit >= 6  else 0.04 } GREEN={ 0.2 if lit >= 6  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=7  RED={ 1.0 if lit >= 7  else 0.04 } GREEN={ 0.2 if lit >= 7  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=8  RED={ 1.0 if lit >= 8  else 0.04 } GREEN={ 0.2 if lit >= 8  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=9  RED={ 1.0 if lit >= 9  else 0.04 } GREEN={ 0.2 if lit >= 9  else 0.008 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=10 RED={ 1.0 if lit >= 10 else 0.04 } GREEN={ 0.2 if lit >= 10 else 0.008 } BLUE=0 TRANSMIT=1
        {% if cur < tgt - 1 %}
            UPDATE_DELAYED_GCODE ID=_BED_PREHEAT_GAUGE DURATION=2
        {% endif %}
    {% endif %}

[delayed_gcode _HOTEND_PREHEAT_GAUGE]
gcode:
    {% set cur = printer.extruder.temperature %}
    {% set tgt = printer.extruder.target %}
    {% if tgt > 0 %}
        {% set lit = [[((cur / tgt) * 10)|int, 0]|max, 10]|min %}
        SET_LED LED=matchstick INDEX=1  RED={ 1.0 if lit >= 1  else 0.04 } GREEN={ 0.4 if lit >= 1  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=2  RED={ 1.0 if lit >= 2  else 0.04 } GREEN={ 0.4 if lit >= 2  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=3  RED={ 1.0 if lit >= 3  else 0.04 } GREEN={ 0.4 if lit >= 3  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=4  RED={ 1.0 if lit >= 4  else 0.04 } GREEN={ 0.4 if lit >= 4  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=5  RED={ 1.0 if lit >= 5  else 0.04 } GREEN={ 0.4 if lit >= 5  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=6  RED={ 1.0 if lit >= 6  else 0.04 } GREEN={ 0.4 if lit >= 6  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=7  RED={ 1.0 if lit >= 7  else 0.04 } GREEN={ 0.4 if lit >= 7  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=8  RED={ 1.0 if lit >= 8  else 0.04 } GREEN={ 0.4 if lit >= 8  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=9  RED={ 1.0 if lit >= 9  else 0.04 } GREEN={ 0.4 if lit >= 9  else 0.016 } BLUE=0 TRANSMIT=0
        SET_LED LED=matchstick INDEX=10 RED={ 1.0 if lit >= 10 else 0.04 } GREEN={ 0.4 if lit >= 10 else 0.016 } BLUE=0 TRANSMIT=1
        {% if cur < tgt - 1 %}
            UPDATE_DELAYED_GCODE ID=_HOTEND_PREHEAT_GAUGE DURATION=2
        {% endif %}
    {% endif %}
