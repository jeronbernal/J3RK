# =========================================================
# Nozzle Brush + Purge Bucket — Annex K3
# =========================================================
#
# MACROS:
#   _PURGE_BRUSH_VARS  — Central config
#   CLEAN_NOZZLE       — Criss-cross wipe on silicone brush
#   PURGE_BUCKET       — Purge 50mm directly into bucket
#   PURGE_AND_CLEAN    — Purge + wipe (called from PRINT_START)
#   BLOB_AND_KICK      — Form blob at X6 Y8, fan duct kicks it into bucket
# =========================================================


[gcode_macro _PURGE_BRUSH_VARS]
description: Shared config for nozzle brush and purge bucket

# --- Bucket ---
variable_bucket_x:        -7      # X position over bucket opening
variable_bucket_y:        26      # Y position over bucket opening
variable_bucket_z:         5      # Z height to purge at over bucket

# --- Brush ---
# Criss-cross pattern between X-2 and X-5, Y10 to Y40
variable_brush_x_right:   -2      # X right edge of brush
variable_brush_x_left:    -5      # X left edge of brush
variable_brush_y_start:   10      # Y front edge of brush
variable_brush_y_end:     40      # Y rear edge of brush
variable_brush_z:          0.5      # Z height for wiping
variable_wipe_count:        6     # Number of criss-cross passes
variable_wipe_speed:      150     # Wipe speed in mm/s
variable_travel_speed:    300     # Travel speed in mm/s
variable_z_hop:            10     # Safe travel Z height

# --- Purge (direct into bucket) ---
variable_purge_amount:    70      # mm of filament to purge into bucket before print
variable_purge_speed:      5      # Extrusion speed mm/s
variable_purge_retract:    1      # mm retract after purge
variable_purge_temp_min:  260     # Minimum temp to allow purging

# --- Load / Unload ---
variable_load_distance:   70      # mm to extrude when loading filament (HOT_LOAD)
variable_unload_distance: 80      # mm to retract when unloading (includes tip form moves)

# --- Blob + Fan Duct Kick ---
# Blob forms at blob_x, blob_y. Fan duct front edge is 36.196mm ahead of
# nozzle in Y, and fan duct bottom is 4.2mm above nozzle tip in Z.
# Kick sweeps in -Y direction, fan duct front face pushes blob into bucket.
#
# Nozzle approach Y = blob_y + fan_duct_y_offset + 20 (extra runup)
# so fan duct front face sits well behind the blob before the sweep.
#
# Adjust kick_z up/down if fan duct misses or hits too high on the blob.
variable_blob_x:           6      # X to form blob at
variable_blob_y:           8      # Y to form blob at
variable_blob_start_z:     0.05   # Z to start extruding — very close to bed to anchor blob
variable_blob_end_z:      11.0    # Z at end of blob extrusion (nozzle rises slowly while extruding)
variable_blob_amount:     65      # mm of filament to form the blob
variable_blob_speed:       2.5    # Extrusion speed mm/s — slow Z rise stacks blob tall
variable_blob_retract:     5      # mm retract simultaneous with fast Z breakaway lift
variable_breakaway_z:     30.0    # Z height to lift to during fast breakaway
variable_fast_z_speed:   200      # mm/s for breakaway Z lift — snaps filament clean from blob
variable_blob_dwell:    5000      # ms to wait for blob to solidify before kick
variable_fan_duct_y_offset: 36.2  # mm fan duct front edge is ahead of nozzle in Y
variable_fan_duct_z_offset:  4.2  # mm fan duct bottom is above nozzle tip in Z
variable_kick_z:           0.4    # Nozzle Z during kick — low so fan duct contacts blob reliably
variable_kick_y_end:       1      # Y to sweep to during kick (into bucket)
variable_kick_speed:      25      # Speed of kick sweep in mm/s

gcode:
    # Variable-holder only


# ---------------------------------------------------------
# PURGE_BUCKET
# Extrude filament directly into bucket
# ---------------------------------------------------------

[gcode_macro PURGE_BUCKET]
description: Purge filament directly into bucket. Usage: PURGE_BUCKET [AMOUNT=60]
gcode:
    {% set v           = printer["gcode_macro _PURGE_BRUSH_VARS"] %}
    {% set amount      = params.AMOUNT|default(v.purge_amount)|float %}
    {% set hotend_temp = printer.extruder.temperature %}
    {% set target_temp = printer.extruder.target %}
    {% set ts          = v.travel_speed * 60 %}

    # --- Home if needed ---
    {% if "xyz" not in printer.toolhead.homed_axes %}
        SET_DISPLAY_TEXT MSG="Homing"
        G28 METHOD=PROXIMITY
    {% endif %}

    # --- Heat if needed ---
    {% if target_temp < v.purge_temp_min %}
        SET_DISPLAY_TEXT MSG="Heating to 270c"
        M109 S270
    {% elif hotend_temp < v.purge_temp_min %}
        SET_DISPLAY_TEXT MSG="Waiting for temp"
        M109 S{target_temp}
    {% endif %}

    {% set parts_fan_speed = printer.fan.speed %}
    M107                                # Fan off — prevent blowing bits out of bucket

    SAVE_GCODE_STATE NAME=PURGE_BUCKET_STATE
    SET_DISPLAY_TEXT MSG="Purging into bucket"
    G90
    M83

    # --- Move over bucket and purge ---
    G0 Z{v.z_hop} F{ts}
    G0 X{v.bucket_x} Y{v.bucket_y} F{ts}
    G0 Z{v.bucket_z} F{ts}
    G1 E{amount} F{v.purge_speed * 60}

    # --- Lift ---
    G0 Z{v.z_hop} F{ts}

    SET_DISPLAY_TEXT MSG="Purge complete"
    RESTORE_GCODE_STATE NAME=PURGE_BUCKET_STATE
    M106 S{ (parts_fan_speed * 255)|int }   # Restore fan speed


# ---------------------------------------------------------
# CLEAN_NOZZLE
# Criss-cross wipe — alternates X-2 and X-5 each stroke
# ---------------------------------------------------------

[gcode_macro CLEAN_NOZZLE]
description: Criss-cross wipe nozzle on brush. Usage: CLEAN_NOZZLE [WIPES=6] [TEMP=0]
gcode:
    {% set v     = printer["gcode_macro _PURGE_BRUSH_VARS"] %}
    {% set wipes = params.WIPES|default(v.wipe_count)|int %}
    {% set temp  = params.TEMP|default(0)|int %}
    {% set hotend_temp = printer.extruder.temperature %}
    {% set ts    = v.travel_speed * 60 %}
    {% set ws    = v.wipe_speed   * 60 %}

    # Optional: heat to specified temp before cleaning
    {% if temp > 0 and hotend_temp < temp %}
        SET_DISPLAY_TEXT MSG="Heating to {temp}c for cleaning"
        M109 S{temp}
    {% endif %}

    {% set parts_fan_speed = printer.fan.speed %}
    M107                                # Fan off — prevent debris scatter during wipe

    MS_CLEAN_NOZZLE
    SAVE_GCODE_STATE NAME=CLEAN_NOZZLE_STATE
    SET_DISPLAY_TEXT MSG="Cleaning nozzle"
    G90

    # --- Home if needed ---
    {% if "xyz" not in printer.toolhead.homed_axes %}
        SET_DISPLAY_TEXT MSG="Homing"
        G28 METHOD=PROXIMITY
    {% endif %}

    # --- Z hop then travel to brush entry ---
    G0 Z{v.z_hop} F{ts}
    G0 X{v.brush_x_right} Y{v.brush_y_start} F{ts}

    # --- Lower into brush ---
    G0 Z{v.brush_z} F{ts}

    # --- Criss-cross wipe passes ---
    # Even passes: X-2, sweep to rear
    # Odd passes:  X-5, sweep to front
    {% for i in range(wipes) %}
        {% if i % 2 == 0 %}
            G0 X{v.brush_x_right} F{ts}
            G0 Y{v.brush_y_end} F{ws}
        {% else %}
            G0 X{v.brush_x_left} F{ts}
            G0 Y{v.brush_y_start} F{ws}
        {% endif %}
    {% endfor %}

    # --- Lift and park at X-6 Y1 ---
    G0 Z{v.z_hop} F{ts}
    G0 X-6 Y1 F{ts}

    SET_DISPLAY_TEXT MSG="Nozzle clean"
    RESTORE_GCODE_STATE NAME=CLEAN_NOZZLE_STATE
    M106 S{ (parts_fan_speed * 255)|int }   # Restore fan speed


# ---------------------------------------------------------
# PURGE_AND_CLEAN
# Purge into bucket then wipe nozzle — called from PRINT_START
# ---------------------------------------------------------

[gcode_macro PURGE_AND_CLEAN]
description: Purge into bucket then wipe nozzle on brush
gcode:
    PURGE_BUCKET
    CLEAN_NOZZLE


# ---------------------------------------------------------
# BLOB_AND_KICK
# Form a blob at X6 Y8, cool it, then use the fan duct to
# kick it into the bucket by sweeping in -Y direction.
#
# Fan duct geometry (from CAD measurements):
#   Front edge: 36.2mm ahead of nozzle in Y
#   Bottom:      4.2mm above nozzle tip in Z
#
# Nozzle positions at Y = blob_y + fan_duct_y_offset + 20 so the
# fan duct front face sits well behind the blob before the sweep.
#
# Tune kick_z if fan duct misses blob — lower = hits lower on blob
# Tune blob_dwell if blob sticks to nozzle — increase to cool longer
# ---------------------------------------------------------

[gcode_macro BLOB_AND_KICK]
description: Form blob at X6 Y8 then fan-duct kick into bucket. Usage: BLOB_AND_KICK
gcode:
    {% set v           = printer["gcode_macro _PURGE_BRUSH_VARS"] %}
    {% set hotend_temp = printer.extruder.temperature %}
    {% set target_temp = printer.extruder.target %}
    {% set ts          = v.travel_speed * 60 %}
    {% set ks          = v.kick_speed   * 60 %}

    # Fan duct geometry — nozzle Y to place fan duct front face behind blob
    # Extra 20mm added so toolhead starts further back before the kick sweep
    {% set kick_y_approach = v.blob_y + v.fan_duct_y_offset + 20 %}

    # --- Home if needed ---
    {% if "xyz" not in printer.toolhead.homed_axes %}
        SET_DISPLAY_TEXT MSG="Homing"
        G28 METHOD=PROXIMITY
    {% endif %}

    # --- Heat if needed ---
    {% if target_temp < v.purge_temp_min %}
        SET_DISPLAY_TEXT MSG="Heating to 270c"
        M109 S270
    {% elif hotend_temp < v.purge_temp_min %}
        SET_DISPLAY_TEXT MSG="Waiting for temp"
        M109 S{target_temp}
    {% endif %}

    SAVE_GCODE_STATE NAME=BLOB_AND_KICK_STATE
    SET_DISPLAY_TEXT MSG="Forming blob"
    G90
    M83

    # --- Travel to blob position ---
    G0 Z{v.z_hop} F{ts}
    G0 X{v.blob_x} Y{v.blob_y} F{ts}
    G0 Z{v.blob_start_z} F{ts}

    # --- Form blob: extrude slowly while rising Z ---
    # Slow extrusion + slow Z rise = filament stacks into a tall column
    G1 E{v.blob_amount} Z{v.blob_end_z} F{v.blob_speed * 60}

    # --- Simultaneous retract + fast Z breakaway ---
    # Fast lift + retract snaps the filament string cleanly from the nozzle
    G1 E-{v.blob_retract} Z{v.breakaway_z} F{v.fast_z_speed * 60}

    # --- Move 10mm away from blob in X before fan on ---
    # Prevents fan airflow from blowing filament string back onto blob
    G0 X{ v.blob_x + 10 } F{ts}

    # --- 25% fan + 5 second dwell to solidify blob ---
    SET_DISPLAY_TEXT MSG="Cooling blob"
    M106 S64
    G4 P{v.blob_dwell}
    M107

    # --- Fan duct kick ---
    # Move nozzle to X=blob_x, Y=kick_y_approach so fan duct front
    # face is just behind the blob, then drop to kick_z and sweep -Y
    SET_DISPLAY_TEXT MSG="Kicking blob into bucket"
    G0 X{v.blob_x} Y{kick_y_approach} F{ts}
    G0 Z{v.kick_z} F{ts}
    G0 Y{v.kick_y_end} F{ks}

    # --- Lift and park over bucket ---
    G0 Z{v.z_hop} F{ts}
    G0 X{v.bucket_x} Y{v.bucket_y} F{ts}

    SET_DISPLAY_TEXT MSG="Blob kicked"
    RESTORE_GCODE_STATE NAME=BLOB_AND_KICK_STATE
