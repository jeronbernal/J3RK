# =========================================================
# Chamber Heater Macros
# Hardware config is in config/chamber_heater.cfg
# =========================================================

[gcode_macro CHAMBER_HEATER_ON]
description: Turn on chamber heater (default 40c, pass TEMP= to override)
gcode:
    {% set temp = params.TEMP|default(40)|int %}
    SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={temp}

[gcode_macro CHAMBER_HEATER_OFF]
description: Turn off chamber heater
gcode:
    SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET=0

# M141 — Set chamber heater target (OrcaSlicer / slicer compatible)
[gcode_macro M141]
description: Set chamber heater target temperature
gcode:
    SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={params.S|default(0)}

# M191 — Set and wait for chamber temperature (1 hour timeout)
# Uses a single blocking TEMPERATURE_WAIT. A delayed_gcode watchdog fires
# after 60 min and raises the heater target above current temp, which
# unblocks the TEMPERATURE_WAIT and lets the print continue with a warning.
[gcode_macro M191]
description: Set and wait for chamber heater target temperature. Gives up with a warning after 60 minutes.
variable_target_bed: 0
variable_target_extruder: 0
variable_timed_out: 0
gcode:
    {% set target_chamber = params.S|float %}
    {% set bed = printer["gcode_macro M191"].target_bed %}
    {% set extruder = printer["gcode_macro M191"].target_extruder %}

    {% if target_chamber == 0 %}
        M117 Chamber heating cancelled
    {% else %}
        SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={target_chamber}
        M104 S{extruder * 0.6}              # Light extruder preheat to assist soak
        M140 S{bed}
        M106 S153                           # Parts fan on to circulate air

        # Reset timeout flag and arm the 60-minute watchdog
        SET_GCODE_VARIABLE MACRO=M191 VARIABLE=timed_out VALUE=0
        UPDATE_DELAYED_GCODE ID=CHAMBER_SOAK_TIMEOUT DURATION=3600

        SET_DISPLAY_TEXT MSG="Waiting for chamber: {target_chamber}c"
        M117 Waiting for chamber: {target_chamber}c

        MS_HEATING_SOAK

        # Single blocking wait — held until chamber hits target OR watchdog releases it
        TEMPERATURE_WAIT SENSOR="heater_generic chamber_heater" MINIMUM={target_chamber - 1}

        # Cancel watchdog if chamber reached temp before timeout
        UPDATE_DELAYED_GCODE ID=CHAMBER_SOAK_TIMEOUT DURATION=0

        # Use a gcode conditional (not Jinja) to check the flag after unblocking
        {% set timed_out = printer["gcode_macro M191"].timed_out %}
        {% if timed_out == 1 %}
            RESPOND TYPE=error MSG="⚠ Chamber soak timed out after 60 min — currently {printer['heater_generic chamber_heater'].temperature|round(1)}c / {target_chamber}c. Continuing anyway."
            M117 Chamber soak timed out — continuing
        {% else %}
            M117 Chamber at target temperature
            RESPOND TYPE=echo MSG="Chamber reached {printer['heater_generic chamber_heater'].temperature|round(1)}c"
        {% endif %}
    {% endif %}

# Watchdog — fires after 60 min if chamber never reached temp.
# Bumps the heater target to current temp + 1 to satisfy TEMPERATURE_WAIT
# and unblock the print queue, then sets the timeout flag for the warning.
[delayed_gcode CHAMBER_SOAK_TIMEOUT]
gcode:
    {% set current = printer["heater_generic chamber_heater"].temperature %}
    SET_GCODE_VARIABLE MACRO=M191 VARIABLE=timed_out VALUE=1
    SET_HEATER_TEMPERATURE HEATER=chamber_heater TARGET={current + 1}

[delayed_gcode NEVERMORE_SHUTOFF]
gcode:
    SET_FAN_SPEED FAN=nevermore SPEED=0.0
